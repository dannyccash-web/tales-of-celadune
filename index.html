<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tales of Celadune</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Metamorphous&family=Lato:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="stage">
    <!-- Layer 1 + 2: world background, player, NPCs (canvas) -->
    <canvas id="game" width="1920" height="1080"></canvas>

    <!-- Layer 3: vignette, multiply blend, fixed to viewport -->
    <img id="vignette" src="assets/images/Vignette.jpg" alt="">

    <!-- Layer 4: UI, fixed to viewport -->
    <div id="ui">
      <div id="topbar">
        <div class="icon-btn" id="btn-inventory">
          <div class="diamond"><span>I</span></div>
          <label>Inventory</label>
        </div>
        <div class="icon-btn" id="btn-menu">
          <div class="diamond"><span>M</span></div>
          <label>Menu</label>
        </div>
      </div>

      <div id="hud">
        <div class="stat">
          <span class="stat-label">Health</span>
          <div class="bar"><div class="bar-bg"><div class="bar-fill health" id="health-fill"></div></div></div>
          <span class="stat-value" id="health-value">10/10</span>
        </div>
        <div class="stat">
          <span class="stat-label">Magic</span>
          <div class="bar"><div class="bar-bg"><div class="bar-fill magic" id="magic-fill"></div></div></div>
          <span class="stat-value" id="magic-value">5/10</span>
        </div>
        <div class="gold">
          <span id="gold-value">1,234</span>
          <div class="coin"></div>
        </div>
      </div>

      <div id="dialog" class="hidden">
        <div class="dialog-box" id="dialog-npc">
          <div id="portrait-frame">
            <img id="dialog-portrait" src="assets/images/Mirelle_Portrait.png" alt="">
          </div>
          <div class="dialog-text">
            <h2 id="dialog-name">Mirelle</h2>
            <h3 id="dialog-role">FARM OWNER</h3>
            <p id="dialog-line"></p>
          </div>
        </div>
        <div class="dialog-box" id="dialog-response-box">
          <svg id="dialog-arrow" width="64" height="40" viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="goldgrad" x1="0" y1="1" x2="1" y2="0">
                <stop offset="0" stop-color="#6b4f28"/>
                <stop offset="0.55" stop-color="#c9a45c"/>
                <stop offset="1" stop-color="#eed694"/>
              </linearGradient>
            </defs>
            <g stroke="url(#goldgrad)" stroke-width="2" fill="none" stroke-linejoin="miter">
              <path d="M9 13 L16 20 L9 27 L2 20 Z"/>
              <path d="M4 20 H42"/>
              <path d="M24 5 L61 20 L24 35 Z"/>
              <path d="M24 11 L45 20 L24 29"/>
              <path d="M24 16 L34 20 L24 24"/>
            </g>
          </svg>
          <div id="dialog-responses"></div>
        </div>
      </div>

      <div id="toast" class="hidden"></div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
